# Workflow template for building .NET projects with PCF controls
name: Build Template

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '24'
        description: 'Node.js version to use'
      run-tests:
        required: false
        type: boolean
        default: true
        description: 'Whether to run tests'
      run-sonar-analysis:
        required: false
        type: boolean
        default: false
        description: 'Whether to run SonarQube analysis'
      artifacts-build-upload:
        required: false
        type: boolean
        default: false
        description: 'Build Power Platform solution'
      sonar-qualitygate-wait:
        required: false
        type: boolean
        default: false
        description: 'Wait for SonarQube quality gate and fail build if it fails'

jobs:

  build:
    runs-on: windows-latest

    env:
      VS_DATAVERSE_SOLUTION_PATH: src\server\Pg.DataverseSync\Pg.DataverseSync.sln
      VS_ENGINE_SOLUTION_PATH: src\server\Pg.DataverseSync.Engine\Pg.DataverseSync.Engine.slnx
      VS_PORTAL_API_SOLUTION_PATH: src\server\Pg.DataverseSync.Api\Pg.DataverseSync.Api.slnx
      TEST_DATAVERSE_ASSEMBLY_PATH: src\server\Pg.DataverseSync\**\bin\Release\*.Tests.dll
      TEST_ENGINE_ASSEMBLY_PATH: src\server\Pg.DataverseSync.Engine\**\bin\Release\*.Tests.dll
      TEST_PORTAL_API_ASSEMBLY_PATH: src\server\Pg.DataverseSync.Api\**\bin\Release\*.Tests.dll
      PCF_CONTROL_FOLDER: src\client\Pg.DataverseSync.Controls
      PORTAL_WEB_FOLDER: src\client\Pg.DataverseSync.Web
      VSTEST_CONSOLE: C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe
      SOLUTION_NAME: DataverseSync
      SOLUTION_FOLDER: solutions
      ENGINE_FUNCTIONS_PACKAGE_NAME: DataverseSyncEngine
      PORTAL_API_FUNCTIONS_PACKAGE_NAME: DataverseSyncPortalAPI
      PORTAL_PACKAGE_NAME: DataverseSyncPortalWeb
      BUILD_RETENTION_DAYS: 14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        if: ${{ inputs.run-sonar-analysis }}
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Cache SonarQube Cloud packages
        if: ${{ inputs.run-sonar-analysis }}
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        if: ${{ inputs.run-sonar-analysis }}
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: ${{ inputs.run-sonar-analysis && steps.cache-sonar-scanner.outputs.cache-hit != 'true'}}
        shell: powershell
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}
  
      - name: Install npm dependencies (PCF)
        run: |
          cd ${{ env.PCF_CONTROL_FOLDER }}\TableSelector
          npm install

      - name: Build npm project (PCF)
        run: |
          cd ${{ env.PCF_CONTROL_FOLDER }}\TableSelector
          npm run build

      - name: Copy PCF build output to solution folder
        if: ${{ inputs.artifacts-build-upload }}
        run: |
          $sourceDir = "${{ env.PCF_CONTROL_FOLDER }}\TableSelector\out\controls\TableSelector"
          $destDir = "${{ env.SOLUTION_FOLDER }}\${{ env.SOLUTION_NAME }}_managed\Controls\pg_Pg.DataverseSync.Controls.TableSelector"
          
          # Copy ControlManifest.xml and bundle.js
          Copy-Item "$sourceDir\ControlManifest.xml" "$destDir\ControlManifest.xml" -Force
          Copy-Item "$sourceDir\bundle.js" "$destDir\bundle.js" -Force
          
      - name: Install npm dependencies (Portal Web)
        run: |
          cd ${{ env.PORTAL_WEB_FOLDER }}
          npm install

      - name: Build npm project (Portal Web)
        run: |
          cd ${{ env.PORTAL_WEB_FOLDER }}
          npm run build

      - name: Restore Dataverse solution NuGet packages
        run: nuget restore ${{ env.VS_DATAVERSE_SOLUTION_PATH }}

      - name: Build Dataverse solution
        run: msbuild ${{ env.VS_DATAVERSE_SOLUTION_PATH }} /p:Configuration=Release /p:Platform="Any CPU"

      - name: Build Engine solution
        run: dotnet build ${{ env.VS_ENGINE_SOLUTION_PATH }} -c Release

      - name: Build Portal API solution
        run: dotnet build ${{ env.VS_PORTAL_API_SOLUTION_PATH }} -c Release

      - name: Run xUnit tests with Visual Studio 2022 Test Runner
        if: ${{ inputs.run-tests }}
        run: |
          $paths = @(
            "${{ env.TEST_DATAVERSE_ASSEMBLY_PATH }}",
            "${{ env.TEST_ENGINE_ASSEMBLY_PATH }}",
            "${{ env.TEST_PORTAL_API_ASSEMBLY_PATH }}"
          )
          foreach ($path in $paths) {
            $testAssemblies = Get-ChildItem -Path $path -Recurse -ErrorAction SilentlyContinue
            foreach ($assembly in $testAssemblies) {
              & "${{ env.VSTEST_CONSOLE }}" $assembly.FullName /Logger:trx /Collect:"Code Coverage" /ResultsDirectory:TestResults
            }
          }

      - name: Publish Test Results
        if: ${{ inputs.run-tests && always() }}
        uses: dorny/test-reporter@v1
        with:
          name: xUnit Test Results
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx

      - name: Convert Code Coverage to OpenCover format
        if: ${{ inputs.run-tests && inputs.run-sonar-analysis }}
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:"TestResults/**/*.coverage" -targetdir:"coverage" -reporttypes:"OpenCover"
          if (Test-Path "coverage/coverage.opencover.xml") {
            Copy-Item "coverage/coverage.opencover.xml" "TestResults/coverage.opencover.xml"
          }

      - name: Run SonarQube Analysis (without quality gate wait)
        if: ${{ inputs.run-sonar-analysis && !inputs.sonar-qualitygate-wait }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"gashupl_dataverse-sync" `
            /o:"gashupl" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.sources="src\server,src\client" `
            /d:sonar.coverage.exclusions="src/client/**" `
            /d:sonar.cs.opencover.reportsPaths="TestResults/coverage.opencover.xml"
          # Re-build Dataverse solution for SonarQube analysis
          msbuild ${{ env.VS_DATAVERSE_SOLUTION_PATH }} /p:Configuration=Release /p:Platform="Any CPU"
          
          # Re-build Azure solution for SonarQube analysis
          dotnet build ${{ env.VS_ENGINE_SOLUTION_PATH }} -c Release

          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Run SonarQube Analysis (with quality gate wait)
        if: ${{ inputs.run-sonar-analysis && inputs.sonar-qualitygate-wait }}
        shell: powershell
        run: |
          .\.sonar\scanner\dotnet-sonarscanner begin `
            /k:"gashupl_dataverse-sync" `
            /o:"gashupl" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.sources="src\server,src\client" `
            /d:sonar.coverage.exclusions="src/client/**" `
            /d:sonar.qualitygate.wait=true `
            /d:sonar.qualitygate.timeout=3000 `
            /d:sonar.cs.opencover.reportsPaths="TestResults/coverage.opencover.xml"
          # Re-build Dataverse solution for SonarQube analysis
          msbuild ${{ env.VS_DATAVERSE_SOLUTION_PATH }} /p:Configuration=Release /p:Platform="Any CPU"
          
          # Re-build Azure solution for SonarQube analysis
          dotnet build ${{ env.VS_ENGINE_SOLUTION_PATH }} -c Release

          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Setup Power Platform CLI
        if: ${{ inputs.artifacts-build-upload }}
        uses: microsoft/powerplatform-actions/actions-install@v1
        with:
          add-tools-to-path: true

      - name: Pack managed solution  
        if: ${{ inputs.artifacts-build-upload }}
        uses: microsoft/powerplatform-actions/pack-solution@v1
        with:
          solution-file: ${{ env.SOLUTION_NAME }}_managed.zip
          solution-folder: ${{ env.SOLUTION_FOLDER }}/${{ env.SOLUTION_NAME }}_managed
          solution-type: 'Managed'
          map-file: config/solution-mappings.xml

      - name: Upload solution artifact
        if: ${{ inputs.artifacts-build-upload }}
        uses: actions/upload-artifact@v4
        with:
          name: DataverseSyncSolution
          path: ${{ env.SOLUTION_NAME }}_managed.zip
          retention-days: ${{ env.BUILD_RETENTION_DAYS }}

      - name: Publish Azure Functions Engine project
        if: ${{ inputs.artifacts-build-upload }}
        run: |
          $functionsProject = "src\server\Pg.DataverseSync.Engine\Pg.DataverseSync.Engine.Functions\Pg.DataverseSync.Engine.Functions.csproj"
          dotnet publish $functionsProject -c Release -o publish\azure-functions --no-build

      - name: Create Azure Functions Engine deployment package
        if: ${{ inputs.artifacts-build-upload }}
        run: |
          $publishPath = "publish\azure-functions"
          $zipPath = "${{ env.ENGINE_FUNCTIONS_PACKAGE_NAME }}.zip"
          Compress-Archive -Path "$publishPath\*" -DestinationPath $zipPath -Force
        
      - name: Upload Azure Functions Engine deployment artifact
        if: ${{ inputs.artifacts-build-upload }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ENGINE_FUNCTIONS_PACKAGE_NAME }}
          path: ${{ env.ENGINE_FUNCTIONS_PACKAGE_NAME }}.zip
          retention-days: ${{ env.BUILD_RETENTION_DAYS }}

      - name: Publish Azure Functions Portal API project
        if: ${{ inputs.artifacts-build-upload }}
        run: |
          $functionsProject = "src\server\Pg.DataverseSync.Api\Pg.DataverseSync.Api\Pg.DataverseSync.Api.csproj"
          dotnet publish $functionsProject -c Release -o publish\azure-functions --no-build

      - name: Create Azure Functions Portal API deployment package
        if: ${{ inputs.artifacts-build-upload }}
        run: |
          $publishPath = "publish\azure-functions"
          $zipPath = "${{ env.PORTAL_API_FUNCTIONS_PACKAGE_NAME }}.zip"
          Compress-Archive -Path "$publishPath\*" -DestinationPath $zipPath -Force
        
      - name: Upload Azure Functions Portal API deployment artifact
        if: ${{ inputs.artifacts-build-upload }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PORTAL_API_FUNCTIONS_PACKAGE_NAME  }}
          path: ${{ env.PORTAL_API_FUNCTIONS_PACKAGE_NAME  }}.zip
          retention-days: ${{ env.BUILD_RETENTION_DAYS }}

      - name: Upload Portal Web build artifact
        if: ${{ inputs.artifacts-build-upload }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PORTAL_PACKAGE_NAME }}
          path: ${{ env.PORTAL_WEB_FOLDER }}/dist  # Adjust path based on your build output directory
          retention-days: ${{ env.BUILD_RETENTION_DAYS }}
          if-no-files-found: error