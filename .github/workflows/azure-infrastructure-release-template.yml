# Workflow template for releasing Azure infrastructure into target environment
name: Azure Infrastructure Release Template

on:
  workflow_call:
    inputs:      
      environment:
        required: true
        type: string
        default: 'test'
        description: 'Azure environment to deploy to (e.g. dev, test, prod)'
      subscription-id:
        required: true
        type: string
        default: ''
        description: 'Azure subscription ID to deploy to'

permissions:
  contents: read    # Required to access repository contents

jobs:
  deploy-azure-infrastructure:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Azure CLI Login (App Registration)
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_SUBSCRIPTION_CONTRIBUTOR_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_SUBSCRIPTION_CONTRIBUTOR_SECRET }}","tenantId":"${{ vars.AZURE_TENANT_ID }}","subscriptionId":"${{ inputs.subscription-id }}"}'
      
      - name: Deploy Azure Infrastructure
        shell: pwsh
        run: |
          .\config\azure-templates\infrastructure-deploy.ps1 -Environment "${{ inputs.environment }}" -SubscriptionId "${{ inputs.subscription-id }}"
